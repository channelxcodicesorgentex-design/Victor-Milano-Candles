<script>
    // FUNZIONE PER IL SUONO DIVINO (Si attiva al primo click sulla pagina)
    let soundPlayed = false;
    function playDivineSound() {
        if (soundPlayed) return;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function createTone(freq, type, duration, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Accordo Celestiale (Frequenze Angeliche)
        createTone(528, 'sine', 6, 0.1); // 528Hz Miracolo
        createTone(396, 'sine', 6, 0.1); // Liberazione
        createTone(741, 'sine', 6, 0.05); // Risveglio intuito
        
        soundPlayed = true;
    }

    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'it'}, 'google_translate_element');
    }
</script>
