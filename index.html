<script>
    let soundPlayed = false;
    function playDivineSound() {
        if (soundPlayed) return;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function createTone(freq, type, duration, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        // Frequenze sacre 528Hz e 432Hz
        createTone(528, 'sine', 8, 0.08);
        createTone(432, 'sine', 8, 0.08);
        soundPlayed = true;
    }

    function googleTranslateElementInit() {

</script>
