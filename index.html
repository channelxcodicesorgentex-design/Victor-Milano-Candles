<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Milano Candles | Manifestazione Fisica</title>
    <style>
        body { background-color: #0d0d0d; color: #f4d03f; font-family: 'Georgia', serif; text-align: center; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Contenitore Fiamma di Benvenuto */
        .welcome-flame {
            padding: 50px 0 20px 0;
            background: radial-gradient(circle at center, #222 0%, #0d0d0d 70%);
        }

        /* La Fiamma Animata (Pura Energia) */
        .flame {
            width: 30px;
            height: 30px;
            background: #ffcc00;
            background: linear-gradient(45deg, #ff9900, #ffcc00);
            border-radius: 80% 0 55% 50% / 55% 0 80% 50%;
            margin: 0 auto;
            transform: rotate(-45deg);
            opacity: 0.9;
            box-shadow: 0 0 30px 10px rgba(255, 153, 0, 0.7);
            animation: flame-flicker 1.5s infinite alternate ease-in-out;
        }

        @keyframes flame-flicker {
            0% { transform: rotate(-45deg) scale(1); box-shadow: 0 0 30px 10px rgba(255, 153, 0, 0.7); }
            100% { transform: rotate(-45deg) scale(1.1) translateY(-3px); box-shadow: 0 0 40px 15px rgba(255, 204, 0, 0.9); }
        }

        /* Base della Candela (Elegante) */
        .candle-base {
            width: 12px;
            height: 50px;
            background: #1a1a1a;
            margin: -5px auto 0 auto;
            border-radius: 3px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .header { padding: 30px 20px 60px 20px; background: #0d0d0d; border-bottom: 1px solid #333; }
        h1 { font-size: 2.3em; letter-spacing: 4px; text-transform: uppercase; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .subtitle { font-style: italic; color: #ffffff; opacity: 0.8; margin-top: 10px; font-size: 1.1em; }
        
        .container { padding: 40px 20px; max-width: 900px; margin: auto; }
        
        .btn-gold { 
            background: linear-gradient(45deg, #ff9900, #ffcc00); 
            color: black; 
            padding: 22px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 50px; 
            display: inline-block; 
            margin: 30px 0; 
            width: 85%; 
            max-width: 400px;
            box-shadow: 0 0 25px rgba(255, 153, 0, 0.5);
            font-size: 1.1em;
            border: none;
            transition: 0.3s;
        }
        .btn-gold:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(255, 204, 0, 0.8); }
        
        #google_translate_element { background: #1a1a1a; padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div id="google_translate_element"></div>

<div class="welcome-flame">
    <div class="flame"></div>
    <div class="candle-base"></div>
</div>

<div class="header">
    <h1>VICTOR MILANO CANDLES</h1>
    <p class="subtitle">L'Emozione Visiva che illumina l'Anima</p>
</div>

<div class="container">
    <a href="catalogo_candele.pdf_20260309_191151_0000-compressed.pdf" target="_blank" class="btn-gold">
        🔥 SFOGLIA IL CATALOGO DELLE FIAMME (PDF) 🔥
    </a>

    <div style="margin-top: 60px; color: #444; font-size: 0.8em; letter-spacing: 1px;">
        <p>© 2026 Victor Milano - Manifestazione Fisica</p>
        <p>Codice Sorgente X</p>
    </div>
</div>

<script>
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'it'}, 'google_translate_element');
    }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
